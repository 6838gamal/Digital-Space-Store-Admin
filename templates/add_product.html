{% extends "base.html" %}

{% block title %}إضافة منتج{% endblock %}

{% block content %}
<h2>إضافة منتج جديد</h2>

{% if success %}
<p style="color:green;">تم إضافة المنتج بنجاح!</p>
{% endif %}

<form method="post">
    <label>العنوان: <input type="text" name="title" required></label><br>
    <label>الوصف: <textarea name="description"></textarea></label><br>
    <label>النوع:
        <select name="product_type" required>
            <option value="كتاب">كتاب</option>
            <option value="سكربت">سكربت</option>
            <option value="قالب">قالب</option>
            <option value="دفتر ملاحظات">دفتر ملاحظات</option>
        </select>
    </label><br>
    <label>السعر: <input type="number" name="price" step="0.01"></label><br>
    <label>رابط الملف: <input type="text" name="file_url"></label><br>
    <button type="submit">إضافة</button>
</form>
{% endblock %}
