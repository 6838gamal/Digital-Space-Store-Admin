{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">إضافة منتج جديد</h2>
{% if success %}
<div class="alert alert-success">تمت إضافة المنتج بنجاح!</div>
{% endif %}
<form method="post">
  <div class="mb-3">
    <label>اسم المنتج</label>
    <input type="text" class="form-control" name="title" required>
  </div>
  <div class="mb-3">
    <label>الوصف</label>
    <textarea class="form-control" name="description"></textarea>
  </div>
  <div class="mb-3">
    <label>نوع المنتج</label>
    <select class="form-select" name="product_type" required>
      <option value="script">سكربت</option>
      <option value="short_book">كتاب قصير</option>
      <option value="automation_template">قالب أتمتة</option>
      <option value="coloring_book">كتاب تلوين</option>
      <option value="notebook">دفتر ملاحظات</option>
    </select>
  </div>
  <div class="mb-3">
    <label>السعر</label>
    <input type="number" step="0.01" class="form-control" name="price">
  </div>
  <div class="mb-3">
    <label>رابط التحميل</label>
    <input type="text" class="form-control" name="file_url">
  </div>
  <button class="btn btn-success w-100">إضافة المنتج</button>
</form>
{% endblock %}
